<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM Producción · Tecnoden</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ============================================================
   CRM Producción Tecnoden — utilitario industrial
   Tipografía: Inter Tight (UI) + JetBrains Mono (datos)
   Paleta: grafito + acento amarillo solar
   ============================================================ */
:root {
  /* Tema oscuro (default) */
  --bg:        #0f1115;
  --panel:    #161922;
  --panel-2: #1d2230;
  --line:     #262b3a;
  --line-2:  #323849;
  --ink:       #e8eaf0;
  --ink-dim: #9aa3b8;
  --ink-mute:#6b7390;
  --accent:   #f5c518; /* amarillo solar */
  --accent-2:#ffd84d;
  --accent-ink: #000;  /* texto sobre acento */
  --ok:       #4ade80;
  --warn:    #fb923c;
  --err:     #f87171;
  --info:     #60a5fa;
  --shadow:  rgba(0,0,0,0.4);
  --row-hover: rgba(255,255,255,0.025);

  /* Instalación (tonos cálidos) */
  --inst-pendiente:    #6b7390;
  --inst-programada:   #fb923c;
  --inst-encurso:      #f97316;
  --inst-instalada:    #4ade80;
  /* Trámite (tonos fríos) */
  --tra-sin:           #6b7390;
  --tra-encurso:       #60a5fa;
  --tra-aprobado:      #4ade80;
  --tra-na:            #475569;

  --r-sm: 4px;
  --r:    6px;
  --r-lg: 10px;
}

[data-theme="light"] {
  /* Tema claro estilo Google/Notion */
  --bg:        #ffffff;
  --panel:    #ffffff;
  --panel-2: #f6f7f9;
  --line:     #e5e7eb;
  --line-2:  #d1d5db;
  --ink:       #1f2328;
  --ink-dim: #4b5563;
  --ink-mute:#6b7280;
  --accent:   #f5c518;
  --accent-2:#eab308;
  --accent-ink: #000;
  --ok:       #16a34a;
  --warn:    #ea580c;
  --err:     #dc2626;
  --info:     #2563eb;
  --shadow:  rgba(15,23,42,0.08);
  --row-hover: rgba(15,23,42,0.04);

  /* Instalación */
  --inst-pendiente:    #6b7280;
  --inst-programada:   #ea580c;
  --inst-encurso:      #c2410c;
  --inst-instalada:    #16a34a;
  /* Trámite */
  --tra-sin:           #6b7280;
  --tra-encurso:       #2563eb;
  --tra-aprobado:      #16a34a;
  --tra-na:            #9ca3af;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Inter Tight', system-ui, sans-serif;
  font-size: 14px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  transition: background-color 0.15s, color 0.15s;
}
.mono { font-family: 'JetBrains Mono', monospace; }

/* Transición suave al cambiar tema */
.tabla-wrap, .drawer, .login-card, header.topbar, .filters,
.field input, .field select, .field textarea, .btn, .estado-pill {
  transition: background-color 0.15s, border-color 0.15s, color 0.15s;
}

/* Hide helpers */
.hidden { display: none !important; }

/* ============================================================ LOGIN */
#login-screen {
  position: fixed; inset: 0;
  display: grid; place-items: center;
  background: radial-gradient(circle at 30% 20%, var(--panel-2) 0%, var(--bg) 60%);
  z-index: 1000;
}
.login-card {
  width: 360px;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 28px;
  box-shadow: 0 8px 32px var(--shadow);
}
.login-brand {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 24px;
}
.login-brand-mark {
  width: 28px; height: 28px;
  background: var(--accent);
  border-radius: var(--r-sm);
  display: grid; place-items: center;
  color: #000; font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
}
.login-brand-text { font-size: 13px; letter-spacing: 0.04em; color: var(--ink-dim); text-transform: uppercase; }
.login-title { font-size: 18px; font-weight: 600; margin: 0 0 4px; }
.login-sub { font-size: 12px; color: var(--ink-mute); margin: 0 0 20px; }

.field { margin-bottom: 14px; }
.field label {
  display: block;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-mute);
  margin-bottom: 6px;
}
.field input, .field select, .field textarea {
  width: 100%;
  background: var(--panel-2);
  border: 1px solid var(--line);
  color: var(--ink);
  font-family: inherit;
  font-size: 14px;
  padding: 9px 11px;
  border-radius: var(--r);
  outline: none;
  transition: border-color 0.15s, background-color 0.15s;
}
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
.field textarea { resize: vertical; min-height: 70px; max-width: 100%; }
.field input[readonly] {
  background: var(--line) !important;
  color: var(--ink-dim);
  cursor: not-allowed;
}

.btn {
  background: var(--accent);
  color: #000;
  font-family: inherit;
  font-weight: 600;
  font-size: 14px;
  border: none;
  padding: 10px 16px;
  border-radius: var(--r);
  cursor: pointer;
  transition: background 0.15s;
  position: relative;
  z-index: 1;
}
.btn:hover { background: var(--accent-2); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-ghost {
  background: transparent;
  color: var(--ink-dim);
  border: 1px solid var(--line);
}
.btn-ghost:hover { background: var(--panel-2); color: var(--ink); }
.btn-danger { background: var(--err); color: #fff; }
.btn-sm { padding: 6px 10px; font-size: 13px; }

.login-error { color: var(--err); font-size: 12px; margin-top: 8px; min-height: 16px; }

/* ============================================================ APP SHELL */
#app {
  display: grid;
  grid-template-rows: auto 1fr;
  height: 100vh;
}

header.topbar {
  display: flex; align-items: center; gap: 16px;
  padding: 0 20px;
  height: 52px;
  background: var(--panel);
  border-bottom: 1px solid var(--line);
}
.brand {
  display: flex; align-items: center; gap: 12px;
}
.brand-logo {
  height: 26px;
  display: block;
}
.brand-sub {
  color: var(--ink-mute);
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border-left: 1px solid var(--line-2);
  padding-left: 12px;
}

.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }

.theme-toggle {
  background: var(--panel-2);
  border: 1px solid var(--line);
  color: var(--ink-dim);
  width: 32px;
  height: 32px;
  border-radius: var(--r);
  cursor: pointer;
  display: grid;
  place-items: center;
  font-size: 16px;
  transition: background-color 0.15s, color 0.15s, border-color 0.15s;
  padding: 0;
}
.theme-toggle:hover {
  color: var(--accent);
  border-color: var(--accent);
}
/* Mostrar solo el ícono apropiado según el tema */
.theme-toggle .theme-icon-light { display: none; }
.theme-toggle .theme-icon-dark  { display: block; }
[data-theme="light"] .theme-toggle .theme-icon-light { display: block; }
[data-theme="light"] .theme-toggle .theme-icon-dark  { display: none; }
.user-chip {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--ink-dim);
  padding: 4px 10px;
  background: var(--panel-2);
  border: 1px solid var(--line);
  border-radius: var(--r);
}

/* ============================================================ FILTERS BAR */
.filters {
  display: flex; gap: 10px; align-items: center;
  padding: 12px 20px;
  background: var(--panel);
  border-bottom: 1px solid var(--line);
  flex-wrap: wrap;
}
.filters select, .filters input {
  background: var(--panel-2);
  border: 1px solid var(--line);
  color: var(--ink);
  padding: 6px 10px;
  border-radius: var(--r);
  font-family: inherit;
  font-size: 13px;
}
.filter-label { font-size: 11px; color: var(--ink-mute); text-transform: uppercase; letter-spacing: 0.08em; }

/* ============================================================ MAIN AREA */
main {
  overflow: auto;
  padding: 16px 20px;
}

/* ============================================================ TABLE */
.tabla-wrap {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  overflow: auto;
}
table.tabla {
  width: 100%;
  border-collapse: collapse;
}
.tabla th {
  text-align: left;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-mute);
  font-weight: 500;
  padding: 12px 14px;
  border-bottom: 1px solid var(--line);
  background: var(--panel-2);
  position: sticky; top: 0;
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
}
.tabla th:hover { color: var(--ink); }
.tabla th.sort-asc::after  { content: ' ↑'; color: var(--accent); }
.tabla th.sort-desc::after { content: ' ↓'; color: var(--accent); }
.tabla td {
  padding: 11px 14px;
  border-bottom: 1px solid var(--line);
  font-size: 13px;
}
.tabla tr { cursor: pointer; }
.tabla tr:hover td { background: var(--row-hover); }
.tabla tr.bloqueado td { color: var(--ink-mute); }

.tabla td.cell-warn { color: var(--warn); font-style: italic; }

.estado-pill {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 500;
  border: 1px solid;
  white-space: nowrap;
}
/* Instalación */
.inst-pendiente   { background: rgba(107,115,144,0.15); border-color: var(--inst-pendiente);  color: var(--inst-pendiente); }
.inst-programada  { background: rgba(251,146,60,0.15);  border-color: var(--inst-programada); color: var(--inst-programada); }
.inst-encurso     { background: rgba(249,115,22,0.18);  border-color: var(--inst-encurso);    color: var(--inst-encurso); }
.inst-instalada   { background: rgba(74,222,128,0.15);  border-color: var(--inst-instalada);  color: var(--inst-instalada); }
/* Trámite */
.tra-sin          { background: rgba(107,115,144,0.15); border-color: var(--tra-sin);      color: var(--tra-sin); }
.tra-encurso      { background: rgba(96,165,250,0.15);  border-color: var(--tra-encurso);  color: var(--tra-encurso); }
.tra-aprobado     { background: rgba(74,222,128,0.15);  border-color: var(--tra-aprobado); color: var(--tra-aprobado); }
.tra-na           { background: rgba(71,85,105,0.15);   border-color: var(--tra-na);       color: var(--tra-na); }

.lock-icon { color: var(--warn); font-size: 11px; margin-right: 6px; }

/* ============================================================ EMPTY STATES */
.empty {
  padding: 60px 20px;
  text-align: center;
  color: var(--ink-mute);
}
.empty h3 { color: var(--ink-dim); margin: 0 0 8px; font-weight: 500; }

/* ============================================================ DETAIL DRAWER */
.drawer-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 50;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.drawer-backdrop.open { opacity: 1; pointer-events: auto; }

.drawer {
  position: fixed;
  top: 0; right: 0; bottom: 0;
  width: 720px; max-width: 95vw;
  background: var(--panel);
  border-left: 1px solid var(--line);
  z-index: 60;
  transform: translateX(100%);
  transition: transform 0.25s ease;
  display: flex; flex-direction: column;
}
.drawer.open { transform: translateX(0); }

.drawer-head {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 20px;
  border-bottom: 1px solid var(--line);
}
.drawer-head h2 { margin: 0; font-size: 16px; flex: 1; }
.drawer-close {
  background: transparent; border: none; color: var(--ink-dim);
  font-size: 22px; cursor: pointer; padding: 0 4px;
}
.drawer-close:hover { color: var(--ink); }

.drawer-body { flex: 1; overflow-y: auto; padding: 18px 20px; position: relative; }
.drawer-footer {
  border-top: 1px solid var(--line);
  padding: 12px 20px;
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  background: var(--panel);
  position: relative;
  z-index: 10;
  flex-shrink: 0;
}
.drawer-footer button { position: relative; z-index: 11; }

.section {
  margin-bottom: 26px;
}
.section h3 {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-mute);
  margin: 0 0 10px;
  font-weight: 600;
  border-bottom: 1px solid var(--line);
  padding-bottom: 6px;
}

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

/* Comentarios */
.comentarios-list {
  display: flex; flex-direction: column; gap: 8px;
  margin-bottom: 10px;
  max-height: 240px;
  overflow-y: auto;
  padding-right: 4px;
}
.comentario {
  background: var(--panel-2);
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 8px 10px;
  font-size: 13px;
}
.comentario .meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-mute);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 4px;
  display: flex; gap: 10px;
}
.comentario .meta .autor { color: var(--accent); }
.comentario-input-row { display: flex; gap: 8px; }
.comentario-input-row textarea { flex: 1; min-height: 38px; resize: vertical; max-width: 100%; }

.combo-row { display: flex; gap: 6px; }
.combo-row select { flex: 1; }

.banner-bloqueado {
  background: rgba(251,146,60,0.1);
  border: 1px solid var(--warn);
  color: var(--warn);
  padding: 10px 12px;
  border-radius: var(--r);
  font-size: 13px;
  margin-bottom: 16px;
  display: flex; gap: 10px; align-items: center;
}

.toast {
  position: fixed;
  bottom: 24px; right: 24px;
  background: var(--panel-2);
  border: 1px solid var(--line);
  padding: 10px 16px;
  border-radius: var(--r);
  font-size: 13px;
  z-index: 200;
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.2s;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.ok { border-color: var(--ok); }
.toast.err { border-color: var(--err); }

/* Mobile */
@media (max-width: 768px) {
  .drawer { width: 100%; }
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
  .filters { padding: 10px; gap: 6px; }
  main { padding: 10px; }
}
</style>
</head>
<body>

<!-- ============================================================ LOGIN -->
<div id="login-screen">
  <form class="login-card" id="login-form" autocomplete="off">
    <div class="login-brand">
      <img src="logo.png" alt="Tecnoden" style="height:32px; display:block">
    </div>
    <h1 class="login-title">CRM Producción</h1>
    <p class="login-sub">Seguimiento de instalaciones solares</p>

    <div class="field">
      <label for="u-user">Usuario</label>
      <input id="u-user" name="user" autocomplete="off" required>
    </div>
    <div class="field">
      <label for="u-pass">Contraseña</label>
      <input id="u-pass" type="password" name="pass" autocomplete="new-password" required>
    </div>
    <button class="btn" style="width:100%" type="submit">Entrar</button>
    <div class="login-error" id="login-error"></div>
  </form>
</div>

<!-- ============================================================ APP -->
<div id="app" class="hidden">

  <header class="topbar">
    <div class="brand">
      <img src="logo.png" alt="Tecnoden" class="brand-logo">
      <div class="brand-sub">Producción</div>
    </div>

    <div class="topbar-right">
      <button class="theme-toggle" id="theme-toggle" title="Cambiar tema">
        <span class="theme-icon-dark">☾</span>
        <span class="theme-icon-light">☼</span>
      </button>
      <div class="user-chip" id="user-chip">—</div>
      <button class="btn btn-ghost btn-sm" id="logout">Salir</button>
    </div>
  </header>

  <div class="filters">
    <span class="filter-label">Filtrar</span>
    <select id="f-inst">
      <option value="">Instalación: todos</option>
      <option>Pendiente</option>
      <option>Programada</option>
      <option>En instalación</option>
      <option>Instalada</option>
    </select>
    <select id="f-tramite">
      <option value="">Trámite: todos</option>
      <option>Sin iniciar</option>
      <option>En trámite</option>
      <option>Aprobado</option>
      <option>N/A</option>
    </select>
    <select id="f-cuadrilla">
      <option value="">Todas las cuadrillas</option>
      <option>Cuadrilla Tecnoden</option>
      <option>Cuadrilla Alex</option>
      <option>Cuadrilla Javier</option>
      <option>Otro</option>
      <option value="__sin">Sin asignar</option>
    </select>
    <input id="f-busqueda" placeholder="Buscar cliente…" style="min-width:200px">
  </div>

  <main>
    <div class="tabla-wrap">
      <table class="tabla">
        <thead>
          <tr>
            <th data-sort="cotizacion_num">#</th>
            <th data-sort="cliente_nombre">Cliente</th>
            <th data-sort="estado_instalacion">Instalación</th>
            <th data-sort="estado_tramite">Trámite CFE</th>
            <th data-sort="cuadrilla">Cuadrilla</th>
            <th data-sort="kw_sistema">kW</th>
            <th data-sort="fecha_programada_instalacion">Programada</th>
            <th data-sort="fecha_terminacion">Terminación</th>
            <th data-sort="siresi">SIRESI</th>
            <th data-sort="asesor_original">Asesor</th>
          </tr>
        </thead>
        <tbody id="tabla-body"></tbody>
      </table>
    </div>
  </main>

</div>

<!-- ============================================================ DRAWER DETALLE -->
<div class="drawer-backdrop" id="drawer-backdrop"></div>
<aside class="drawer" id="drawer">
  <div class="drawer-head">
    <h2 id="d-titulo">—</h2>
    <button class="drawer-close" id="d-close">×</button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
  <div class="drawer-footer" id="drawer-footer"></div>
</aside>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   CONFIG
   ============================================================ */
const SUPABASE_URL  = 'https://lernzlbzrgatqkadwhas.supabase.co';
const SUPABASE_ANON = 'PEGAR_AQUI_LA_ANON_KEY'; // ← Reemplazar con la misma anon key del CRM viejo

// Usuarios V1 — definir contraseñas reales antes de desplegar
const USERS = {
  german:  { pass: 'german123',  display: 'German'  },
  daniel:  { pass: 'daniel123',  display: 'Daniel'  },
  sgerman: { pass: 'sgerman123', display: 'SGerman' },
  admin:   { pass: 'Tecnoden10!', display: 'Admin'  }, // compartido con CRM viejo por compatibilidad
  victor:  { pass: 'victor123',   display: 'Victor' }
};

const CUADRILLAS = ['Cuadrilla Tecnoden', 'Cuadrilla Alex', 'Cuadrilla Javier', 'Otro'];
const ESTADOS_INST    = ['Pendiente', 'Programada', 'En instalación', 'Instalada'];
const ESTADOS_TRAMITE = ['Sin iniciar', 'En trámite', 'Aprobado', 'N/A'];

const supa = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

/* ============================================================
   STATE
   ============================================================ */
let currentUser = null;
let proyectos   = [];
let currentDrawerId = null;
let sortState   = { field: 'cotizacion_num', dir: 'desc' };

/* ============================================================
   LOGIN
   ============================================================ */
const $ = (sel) => document.querySelector(sel);

$('#login-form').addEventListener('submit', (e) => {
  e.preventDefault();
  const u = $('#u-user').value.trim().toLowerCase();
  const p = $('#u-pass').value;
  const found = USERS[u];
  if (!found || found.pass !== p) {
    $('#login-error').textContent = 'Usuario o contraseña incorrectos';
    return;
  }
  currentUser = found.display;
  localStorage.setItem('crmp_user', u);
  startApp();
});

$('#logout').addEventListener('click', () => {
  localStorage.removeItem('crmp_user');
  location.reload();
});

// Tema claro/oscuro
function aplicarTema(tema) {
  document.documentElement.setAttribute('data-theme', tema);
  localStorage.setItem('crmp_theme', tema);
}
// Aplicar tema guardado al cargar (antes de mostrar nada)
aplicarTema(localStorage.getItem('crmp_theme') || 'dark');

// Auto-login si hay sesión
const saved = localStorage.getItem('crmp_user');
if (saved && USERS[saved]) {
  currentUser = USERS[saved].display;
  startApp();
}

function startApp() {
  $('#login-screen').classList.add('hidden');
  $('#app').classList.remove('hidden');
  $('#user-chip').textContent = currentUser;
  bindUI();
  cargarCatalogo();
  loadProyectos();
}

/* ============================================================
   UI BINDINGS
   ============================================================ */
function bindUI() {
  // Toggle de tema
  $('#theme-toggle').addEventListener('click', () => {
    const actual = document.documentElement.getAttribute('data-theme') || 'dark';
    aplicarTema(actual === 'dark' ? 'light' : 'dark');
  });

  // Filtros
  ['f-inst', 'f-tramite', 'f-cuadrilla', 'f-busqueda'].forEach(id => {
    $('#' + id).addEventListener('input', render);
  });

  // Click en cualquier fila (delegación: sobrevive a re-renders)
  $('#tabla-body').addEventListener('click', (e) => {
    const tr = e.target.closest('tr[data-id]');
    if (tr) openDrawer(parseInt(tr.dataset.id));
  });

  // Footer del drawer (delegación: los botones se crean dinámicamente)
  $('#drawer-footer').addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-action]');
    if (!btn) return;
    if (btn.dataset.action === 'save')  guardarDrawer();
    if (btn.dataset.action === 'close') closeDrawer();
  });

  // Sort de la tabla
  document.querySelectorAll('.tabla th[data-sort]').forEach(th => {
    th.addEventListener('click', () => {
      const campo = th.dataset.sort;
      if (sortState.field === campo) {
        sortState.dir = sortState.dir === 'asc' ? 'desc' : 'asc';
      } else {
        sortState.field = campo;
        sortState.dir = 'asc';
      }
      render();
    });
  });

  // Drawer
  $('#d-close').addEventListener('click', closeDrawer);
  $('#drawer-backdrop').addEventListener('click', closeDrawer);

  // Atajo de teclado: Ctrl/Cmd + S para guardar mientras el drawer está abierto
  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's') {
      const saveBtn = document.querySelector('#drawer-footer button[data-action="save"]');
      if (currentDrawerId && saveBtn) {
        e.preventDefault();
        guardarDrawer();
      }
    }
    if (e.key === 'Escape' && currentDrawerId) {
      closeDrawer();
    }
  });
}

/* ============================================================
   DATA
   ============================================================ */
async function loadProyectos() {
  const { data, error } = await supa
    .from('proyectos')
    .select('*')
    .order('creado_en', { ascending: false });
  if (error) {
    toast('Error cargando proyectos: ' + error.message, 'err');
    return;
  }
  proyectos = data || [];
  render();
}

async function loadComentarios(proyectoId, tabla) {
  const { data, error } = await supa
    .from(tabla)
    .select('*')
    .eq('proyecto_id', proyectoId)
    .order('creado_en', { ascending: false });
  if (error) {
    toast('Error cargando comentarios: ' + error.message, 'err');
    return [];
  }
  return data || [];
}

async function addComentario(tabla, proyectoId, comentario) {
  const { error } = await supa.from(tabla).insert({
    proyecto_id: proyectoId,
    autor: currentUser,
    comentario
  });
  if (error) { toast('Error: ' + error.message, 'err'); return false; }
  return true;
}

async function actualizarProyecto(id, cambios) {
  const { data, error } = await supa.from('proyectos').update(cambios).eq('id', id).select();
  if (error) {
    console.error('Error actualizando proyecto:', error);
    toast('Error: ' + error.message, 'err');
    return false;
  }
  console.log('Proyecto actualizado:', data);
  return true;
}

// Catálogo de equipos (marcas + potencias)
let catalogoCache = { panel: [], inversor: [] };

async function cargarCatalogo() {
  const { data, error } = await supa
    .from('catalogo_equipos')
    .select('*')
    .order('marca');
  if (error) {
    console.error('Error cargando catálogo:', error);
    return;
  }
  catalogoCache.panel    = (data || []).filter(x => x.tipo === 'panel');
  catalogoCache.inversor = (data || []).filter(x => x.tipo === 'inversor');
}

async function agregarAlCatalogo(tipo, marca, potencia) {
  if (!marca) return false;
  const { error } = await supa.from('catalogo_equipos').insert({
    tipo, marca, potencia: potencia || null, creado_por: currentUser
  });
  // 23505 = unique_violation en Postgres → ya existe, todo bien, lo ignoramos
  if (error && error.code !== '23505') {
    console.error('Error agregando al catálogo:', error);
    return false;
  }
  if (!error) {
    await cargarCatalogo();
  }
  return true;
}

/* ============================================================
   FILTROS
   ============================================================ */
function aplicarFiltros(lista) {
  const fInst = $('#f-inst').value;
  const fTra  = $('#f-tramite').value;
  const fCua  = $('#f-cuadrilla').value;
  const fBus  = $('#f-busqueda').value.trim().toLowerCase();
  return lista.filter(p => {
    if (fInst && p.estado_instalacion !== fInst) return false;
    if (fTra  && p.estado_tramite     !== fTra)  return false;
    if (fCua === '__sin') { if (p.cuadrilla) return false; }
    else if (fCua && p.cuadrilla !== fCua) return false;
    if (fBus) {
      const blob = `${p.cliente_nombre||''} ${p.asesor_original||''} ${p.siresi||''}`.toLowerCase();
      if (!blob.includes(fBus)) return false;
    }
    return true;
  });
}

/* ============================================================
   RENDER
   ============================================================ */
function render() {
  const filtrados = aplicarFiltros(proyectos);
  ordenar(filtrados);
  renderTabla(filtrados);
  actualizarHeadersSort();
}

function ordenar(lista) {
  const { field, dir } = sortState;
  const mult = dir === 'asc' ? 1 : -1;
  lista.sort((a, b) => {
    let va = a[field], vb = b[field];
    if (va == null && vb == null) return 0;
    if (va == null) return 1;   // nulls al final siempre
    if (vb == null) return -1;
    if (typeof va === 'number' && typeof vb === 'number') return (va - vb) * mult;
    return String(va).localeCompare(String(vb), 'es') * mult;
  });
}

function actualizarHeadersSort() {
  document.querySelectorAll('.tabla th[data-sort]').forEach(th => {
    th.classList.remove('sort-asc', 'sort-desc');
    if (th.dataset.sort === sortState.field) {
      th.classList.add(sortState.dir === 'asc' ? 'sort-asc' : 'sort-desc');
    }
  });
}

function renderTabla(lista) {
  const body = $('#tabla-body');
  if (lista.length === 0) {
    body.innerHTML = `<tr><td colspan="10"><div class="empty"><h3>Sin proyectos</h3><p>No hay proyectos que coincidan con los filtros.</p></div></td></tr>`;
    return;
  }
  body.innerHTML = lista.map(p => {
    const cuadrilla = p.cuadrilla === 'Otro' ? (p.cuadrilla_otro || 'Otro') : p.cuadrilla;
    const cuadrillaCell = cuadrilla
      ? `<td class="mono" style="font-size:12px">${escapeHtml(cuadrilla)}</td>`
      : `<td class="cell-warn mono" style="font-size:12px">Sin asignar</td>`;
    const fechaCell = p.fecha_programada_instalacion
      ? `<td class="mono">${fmtFecha(p.fecha_programada_instalacion)}</td>`
      : `<td class="cell-warn mono">Sin fecha</td>`;
    return `<tr class="${p.bloqueado ? 'bloqueado' : ''}" data-id="${p.id}">
      <td class="mono" style="color:var(--ink-mute)">${p.cotizacion_num ? '#' + p.cotizacion_num : '—'}</td>
      <td>${p.bloqueado ? '<span class="lock-icon">🔒</span>' : ''}${escapeHtml(p.cliente_nombre || '(sin nombre)')}</td>
      <td><span class="estado-pill ${classInst(p.estado_instalacion)}">${p.estado_instalacion || '—'}</span></td>
      <td><span class="estado-pill ${classTra(p.estado_tramite)}">${p.estado_tramite || '—'}</span></td>
      ${cuadrillaCell}
      <td class="mono">${p.kw_sistema ? p.kw_sistema + ' kW' : '—'}</td>
      ${fechaCell}
      <td class="mono">${fmtFecha(p.fecha_terminacion)}</td>
      <td class="mono">${escapeHtml(p.siresi || '—')}</td>
      <td>${escapeHtml(p.asesor_original || '—')}</td>
    </tr>`;
  }).join('');
}

function classInst(estado) {
  return {
    'Pendiente':      'inst-pendiente',
    'Programada':     'inst-programada',
    'En instalación': 'inst-encurso',
    'Instalada':      'inst-instalada'
  }[estado] || 'inst-pendiente';
}
function classTra(estado) {
  return {
    'Sin iniciar': 'tra-sin',
    'En trámite':  'tra-encurso',
    'Aprobado':    'tra-aprobado',
    'N/A':         'tra-na'
  }[estado] || 'tra-sin';
}

function bindMarcaSelect(tipo, selectEl, inputEl) {
  selectEl.addEventListener('change', async () => {
    const v = selectEl.value;
    if (v === '__nueva__') {
      const nueva = prompt(`Nueva marca de ${tipo}:`);
      if (nueva && nueva.trim()) {
        const marca = nueva.trim();
        const ok = await agregarAlCatalogo(tipo, marca, null);
        if (ok) {
          toast(`Marca "${marca}" guardada`, 'ok');
          // Repoblar el select
          const opciones = ['<option value="">— elegir —</option>',
                            marcaOptionsHTML(tipo, marca),
                            '<option value="__nueva__">+ Agregar nueva marca…</option>'].join('');
          selectEl.innerHTML = opciones;
          selectEl.value = marca;
          inputEl.value = marca;
        }
      } else {
        selectEl.value = inputEl.value || '';
      }
    } else {
      inputEl.value = v;
    }
  });
}

function marcaOptionsHTML(tipo, seleccionada) {
  const lista = catalogoCache[tipo] || [];
  // Marcas únicas
  const marcas = [...new Set(lista.map(x => x.marca))].sort();
  // Si la seleccionada no está en el catálogo (caso heredado), agregarla
  if (seleccionada && !marcas.includes(seleccionada)) {
    marcas.unshift(seleccionada);
  }
  return marcas.map(m =>
    `<option value="${escapeAttr(m)}" ${m === seleccionada ? 'selected' : ''}>${escapeHtml(m)}</option>`
  ).join('');
}

async function cargarBitacoras(id) {
  const [cfe, gen] = await Promise.all([
    loadComentarios(id, 'proyecto_comentarios_cfe'),
    loadComentarios(id, 'proyecto_comentarios_general')
  ]);
  $('#cfe-list').innerHTML = cfe.length
    ? cfe.map(c => renderComentario(c)).join('')
    : '<div class="empty" style="padding:20px">Sin actualizaciones del SIRESI.</div>';
  $('#gen-list').innerHTML = gen.length
    ? gen.map(c => renderComentario(c)).join('')
    : '<div class="empty" style="padding:20px">Sin notas en la bitácora.</div>';
}

function renderComentario(c) {
  return `<div class="comentario">
    <div class="meta">
      <span class="autor">${escapeHtml(c.autor)}</span>
      <span>${fmtFechaHora(c.creado_en)}</span>
    </div>
    <div>${escapeHtml(c.comentario)}</div>
  </div>`;
}

async function agregarComentario(tipo) {
  const tabla = tipo === 'cfe' ? 'proyecto_comentarios_cfe' : 'proyecto_comentarios_general';
  const input = $('#' + tipo + '-new');
  const texto = input.value.trim();
  if (!texto) return;
  const ok = await addComentario(tabla, currentDrawerId, texto);
  if (ok) {
    input.value = '';
    toast('Comentario agregado', 'ok');
    cargarBitacoras(currentDrawerId);
  }
}

async function guardarDrawer() {
  const cambios = {};
  document.querySelectorAll('#drawer-body [data-field]').forEach(el => {
    let v = el.value;
    const field = el.dataset.field;

    if (v === '' || v === undefined) {
      v = null;
    } else if (el.type === 'number') {
      const n = parseFloat(v);
      v = isNaN(n) ? null : n;
    }
    cambios[field] = v;
  });

  console.log('Guardando proyecto', currentDrawerId, cambios);

  // Si hay marcas con potencia, alimentar el catálogo
  if (cambios.marca_paneles && cambios.potencia_paneles) {
    agregarAlCatalogo('panel', cambios.marca_paneles, cambios.potencia_paneles);
  }
  if (cambios.marca_inversor && cambios.potencia_inversor) {
    agregarAlCatalogo('inversor', cambios.marca_inversor, cambios.potencia_inversor);
  }

  const ok = await actualizarProyecto(currentDrawerId, cambios);
  if (ok) {
    toast('Cambios guardados', 'ok');
    await loadProyectos();
    closeDrawer();
  }
}

function closeDrawer() {
  $('#drawer').classList.remove('open');
  $('#drawer-backdrop').classList.remove('open');
  currentDrawerId = null;
}

/* ============================================================
   HELPERS
   ============================================================ */
function estadoClass(e) {
  return {
    'Pendiente':       'estado-pendiente',
    'En trámite':      'estado-tramite',
    'En instalación':  'estado-instalacion',
    'Terminado':       'estado-terminado'
  }[e] || 'estado-pendiente';
}
function parseFecha(f) {
  const d = new Date(f + 'T00:00:00');
  return isNaN(d) ? new Date(f) : d;
}
function fmtFecha(f) {
  if (!f) return '—';
  const d = parseFecha(f);
  return d.toLocaleDateString('es-MX', { day: '2-digit', month: 'short' });
}
function fmtFechaHora(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('es-MX', { day: '2-digit', month: 'short' }) + ' · ' +
         d.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
}
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function escapeAttr(s) { return escapeHtml(s); }

let toastTimer = null;
function toast(msg, kind = 'ok') {
  const t = $('#toast');
  t.textContent = msg;
  t.className = 'toast show ' + kind;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}
</script>
