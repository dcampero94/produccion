<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM Producción · Tecnoden</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ============================================================
   CRM Producción Tecnoden — utilitario industrial
   Tipografía: Inter Tight (UI) + JetBrains Mono (datos)
   Paleta: grafito + acento amarillo solar
   ============================================================ */
:root {
  --bg:        #0f1115;
  --panel:    #161922;
  --panel-2: #1d2230;
  --line:     #262b3a;
  --line-2:  #323849;
  --ink:       #e8eaf0;
  --ink-dim: #9aa3b8;
  --ink-mute:#6b7390;
  --accent:   #f5c518; /* amarillo solar */
  --accent-2:#ffd84d;
  --ok:       #4ade80;
  --warn:    #fb923c;
  --err:     #f87171;
  --info:     #60a5fa;

  --st-pendiente:   #6b7390;
  --st-tramite:     #60a5fa;
  --st-instalacion:#fb923c;
  --st-terminado:  #4ade80;

  --r-sm: 4px;
  --r:    6px;
  --r-lg: 10px;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Inter Tight', system-ui, sans-serif;
  font-size: 14px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
}
.mono { font-family: 'JetBrains Mono', monospace; }

/* Hide helpers */
.hidden { display: none !important; }

/* ============================================================ LOGIN */
#login-screen {
  position: fixed; inset: 0;
  display: grid; place-items: center;
  background: radial-gradient(circle at 30% 20%, #1a1f2e 0%, var(--bg) 60%);
  z-index: 1000;
}
.login-card {
  width: 360px;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 28px;
}
.login-brand {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 24px;
}
.login-brand-mark {
  width: 28px; height: 28px;
  background: var(--accent);
  border-radius: var(--r-sm);
  display: grid; place-items: center;
  color: #000; font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
}
.login-brand-text { font-size: 13px; letter-spacing: 0.04em; color: var(--ink-dim); text-transform: uppercase; }
.login-title { font-size: 18px; font-weight: 600; margin: 0 0 4px; }
.login-sub { font-size: 12px; color: var(--ink-mute); margin: 0 0 20px; }

.field { margin-bottom: 14px; }
.field label {
  display: block;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-mute);
  margin-bottom: 6px;
}
.field input, .field select, .field textarea {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--line);
  color: var(--ink);
  font-family: inherit;
  font-size: 14px;
  padding: 9px 11px;
  border-radius: var(--r);
  outline: none;
  transition: border-color 0.15s;
}
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
.field textarea { resize: vertical; min-height: 70px; }

.btn {
  background: var(--accent);
  color: #000;
  font-family: inherit;
  font-weight: 600;
  font-size: 14px;
  border: none;
  padding: 10px 16px;
  border-radius: var(--r);
  cursor: pointer;
  transition: background 0.15s;
}
.btn:hover { background: var(--accent-2); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-ghost {
  background: transparent;
  color: var(--ink-dim);
  border: 1px solid var(--line);
}
.btn-ghost:hover { background: var(--panel-2); color: var(--ink); }
.btn-danger { background: var(--err); color: #fff; }
.btn-sm { padding: 6px 10px; font-size: 13px; }

.login-error { color: var(--err); font-size: 12px; margin-top: 8px; min-height: 16px; }

/* ============================================================ APP SHELL */
#app {
  display: grid;
  grid-template-rows: auto 1fr;
  height: 100vh;
}

header.topbar {
  display: flex; align-items: center; gap: 16px;
  padding: 0 20px;
  height: 52px;
  background: var(--panel);
  border-bottom: 1px solid var(--line);
}
.brand {
  display: flex; align-items: center; gap: 8px;
  font-weight: 600;
}
.brand-mark {
  width: 22px; height: 22px;
  background: var(--accent);
  border-radius: var(--r-sm);
  display: grid; place-items: center;
  color: #000; font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
}
.brand-sub { color: var(--ink-mute); font-size: 12px; letter-spacing: 0.04em; text-transform: uppercase; }

.view-switch { display: flex; gap: 2px; background: var(--bg); padding: 3px; border-radius: var(--r); border: 1px solid var(--line); }
.view-switch button {
  background: transparent; border: none; color: var(--ink-dim);
  padding: 5px 12px; font-family: inherit; font-size: 13px;
  border-radius: var(--r-sm); cursor: pointer;
}
.view-switch button.active { background: var(--panel-2); color: var(--ink); }

.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.user-chip {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--ink-dim);
  padding: 4px 10px;
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: var(--r);
}

/* ============================================================ FILTERS BAR */
.filters {
  display: flex; gap: 10px; align-items: center;
  padding: 12px 20px;
  background: var(--panel);
  border-bottom: 1px solid var(--line);
  flex-wrap: wrap;
}
.filters select, .filters input {
  background: var(--bg);
  border: 1px solid var(--line);
  color: var(--ink);
  padding: 6px 10px;
  border-radius: var(--r);
  font-family: inherit;
  font-size: 13px;
}
.filter-label { font-size: 11px; color: var(--ink-mute); text-transform: uppercase; letter-spacing: 0.08em; }

.counters {
  display: flex; gap: 6px; margin-left: auto;
}
.counter {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  padding: 4px 10px;
  border-radius: var(--r);
  background: var(--bg);
  border: 1px solid var(--line);
  display: flex; align-items: center; gap: 6px;
}
.counter .dot { width: 7px; height: 7px; border-radius: 50%; }
.counter .num { color: var(--ink); font-weight: 600; }

/* ============================================================ MAIN AREA */
main {
  overflow: auto;
  padding: 16px 20px;
}

/* ============================================================ GANTT */
.gantt-wrap {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  overflow: hidden;
}
.gantt {
  display: grid;
  grid-template-columns: 280px 1fr;
}
.gantt-side {
  border-right: 1px solid var(--line);
  background: var(--panel-2);
}
.gantt-side-header, .gantt-time-header {
  height: 48px;
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center;
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--ink-mute);
  padding: 0 14px;
}
.gantt-row, .gantt-time-row {
  height: 44px;
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center;
}
.gantt-row { padding: 0 14px; gap: 10px; cursor: pointer; }
.gantt-row:hover { background: rgba(255,255,255,0.02); }
.gantt-row .nombre { font-weight: 500; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.gantt-row .cuadrilla { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-mute); }

.gantt-time {
  position: relative;
  overflow-x: auto;
}
.gantt-time-header {
  display: grid;
  position: sticky; top: 0;
  background: var(--panel-2);
  z-index: 2;
  padding: 0;
}
.gantt-time-header .month {
  border-right: 1px solid var(--line);
  padding: 0 10px;
  display: flex; align-items: center;
  font-size: 11px;
}
.gantt-time-row {
  position: relative;
  border-bottom: 1px solid var(--line);
}
.gantt-time-row .day-grid {
  position: absolute; inset: 0;
  display: flex;
}
.gantt-time-row .day {
  flex: 1; border-right: 1px solid rgba(255,255,255,0.025);
}
.gantt-time-row .day.weekend { background: rgba(255,255,255,0.015); }
.gantt-bar {
  position: absolute;
  top: 11px;
  height: 22px;
  border-radius: var(--r);
  display: flex; align-items: center;
  padding: 0 8px;
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  color: #fff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  border: 1px solid rgba(0,0,0,0.3);
}
.gantt-bar.estado-pendiente    { background: var(--st-pendiente); }
.gantt-bar.estado-tramite      { background: var(--st-tramite); color: #0b1220; }
.gantt-bar.estado-instalacion  { background: var(--st-instalacion); color: #2b1500; }
.gantt-bar.estado-terminado    { background: var(--st-terminado); color: #04240f; }
.gantt-today {
  position: absolute; top: 0; bottom: 0;
  width: 1px; background: var(--accent);
  z-index: 1;
}
.gantt-today::before {
  content: 'HOY';
  position: absolute; top: -16px; left: -14px;
  font-size: 9px; color: var(--accent);
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.1em;
}

/* ============================================================ TABLE */
.tabla-wrap {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  overflow: hidden;
}
table.tabla {
  width: 100%;
  border-collapse: collapse;
}
.tabla th {
  text-align: left;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-mute);
  font-weight: 500;
  padding: 12px 14px;
  border-bottom: 1px solid var(--line);
  background: var(--panel-2);
  position: sticky; top: 0;
}
.tabla td {
  padding: 11px 14px;
  border-bottom: 1px solid var(--line);
  font-size: 13px;
}
.tabla tr { cursor: pointer; }
.tabla tr:hover td { background: rgba(255,255,255,0.02); }
.tabla tr.bloqueado td { color: var(--ink-mute); }
.tabla tr.bloqueado td::after {}

.estado-pill {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 500;
  border: 1px solid;
}
.estado-pill.estado-pendiente   { background: rgba(107,115,144,0.15); border-color: var(--st-pendiente); color: var(--st-pendiente); }
.estado-pill.estado-tramite     { background: rgba(96,165,250,0.15);  border-color: var(--st-tramite);  color: var(--st-tramite); }
.estado-pill.estado-instalacion { background: rgba(251,146,60,0.15);  border-color: var(--st-instalacion); color: var(--st-instalacion); }
.estado-pill.estado-terminado   { background: rgba(74,222,128,0.15);  border-color: var(--st-terminado);   color: var(--st-terminado); }

.lock-icon { color: var(--warn); font-size: 11px; margin-right: 6px; }

/* ============================================================ EMPTY STATES */
.empty {
  padding: 60px 20px;
  text-align: center;
  color: var(--ink-mute);
}
.empty h3 { color: var(--ink-dim); margin: 0 0 8px; font-weight: 500; }

/* ============================================================ DETAIL DRAWER */
.drawer-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 50;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.drawer-backdrop.open { opacity: 1; pointer-events: auto; }

.drawer {
  position: fixed;
  top: 0; right: 0; bottom: 0;
  width: 720px; max-width: 95vw;
  background: var(--panel);
  border-left: 1px solid var(--line);
  z-index: 60;
  transform: translateX(100%);
  transition: transform 0.25s ease;
  display: flex; flex-direction: column;
}
.drawer.open { transform: translateX(0); }

.drawer-head {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 20px;
  border-bottom: 1px solid var(--line);
}
.drawer-head h2 { margin: 0; font-size: 16px; flex: 1; }
.drawer-close {
  background: transparent; border: none; color: var(--ink-dim);
  font-size: 22px; cursor: pointer; padding: 0 4px;
}
.drawer-close:hover { color: var(--ink); }

.drawer-body { flex: 1; overflow-y: auto; padding: 18px 20px; }
.drawer-footer {
  border-top: 1px solid var(--line);
  padding: 12px 20px;
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  background: var(--panel);
}

.section {
  margin-bottom: 26px;
}
.section h3 {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-mute);
  margin: 0 0 10px;
  font-weight: 600;
  border-bottom: 1px solid var(--line);
  padding-bottom: 6px;
}

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

/* Comentarios */
.comentarios-list {
  display: flex; flex-direction: column; gap: 8px;
  margin-bottom: 10px;
  max-height: 240px;
  overflow-y: auto;
  padding-right: 4px;
}
.comentario {
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 8px 10px;
  font-size: 13px;
}
.comentario .meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-mute);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 4px;
  display: flex; gap: 10px;
}
.comentario .meta .autor { color: var(--accent); }
.comentario-input-row { display: flex; gap: 8px; }
.comentario-input-row textarea { flex: 1; min-height: 38px; resize: vertical; }

.banner-bloqueado {
  background: rgba(251,146,60,0.1);
  border: 1px solid var(--warn);
  color: var(--warn);
  padding: 10px 12px;
  border-radius: var(--r);
  font-size: 13px;
  margin-bottom: 16px;
  display: flex; gap: 10px; align-items: center;
}

.toast {
  position: fixed;
  bottom: 24px; right: 24px;
  background: var(--panel-2);
  border: 1px solid var(--line);
  padding: 10px 16px;
  border-radius: var(--r);
  font-size: 13px;
  z-index: 200;
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.2s;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.ok { border-color: var(--ok); }
.toast.err { border-color: var(--err); }

/* Mobile */
@media (max-width: 768px) {
  .gantt { grid-template-columns: 160px 1fr; }
  .drawer { width: 100%; }
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
  .filters { padding: 10px; gap: 6px; }
  main { padding: 10px; }
}
</style>
</head>
<body>

<!-- ============================================================ LOGIN -->
<div id="login-screen">
  <form class="login-card" id="login-form" autocomplete="off">
    <div class="login-brand">
      <div class="login-brand-mark">T</div>
      <div>
        <div style="font-weight:600">Tecnoden</div>
        <div class="login-brand-text">CRM Producción</div>
      </div>
    </div>
    <h1 class="login-title">Iniciar sesión</h1>
    <p class="login-sub">Seguimiento de instalaciones solares</p>

    <div class="field">
      <label for="u-user">Usuario</label>
      <input id="u-user" name="user" autocomplete="off" required>
    </div>
    <div class="field">
      <label for="u-pass">Contraseña</label>
      <input id="u-pass" type="password" name="pass" autocomplete="new-password" required>
    </div>
    <button class="btn" style="width:100%" type="submit">Entrar</button>
    <div class="login-error" id="login-error"></div>
  </form>
</div>

<!-- ============================================================ APP -->
<div id="app" class="hidden">

  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">T</div>
      <div>
        <div>Producción</div>
        <div class="brand-sub" style="margin-top:-2px">Tecnoden</div>
      </div>
    </div>

    <div class="view-switch" id="view-switch">
      <button data-view="gantt" class="active">Gantt</button>
      <button data-view="tabla">Tabla</button>
    </div>

    <div class="topbar-right">
      <div class="user-chip" id="user-chip">—</div>
      <button class="btn btn-ghost btn-sm" id="logout">Salir</button>
    </div>
  </header>

  <div class="filters">
    <span class="filter-label">Filtrar</span>
    <select id="f-estado">
      <option value="">Todos los estados</option>
      <option>Pendiente</option>
      <option>En trámite</option>
      <option>En instalación</option>
      <option>Terminado</option>
    </select>
    <select id="f-cuadrilla">
      <option value="">Todas las cuadrillas</option>
      <option>Cuadrilla Tecnoden</option>
      <option>Cuadrilla Alex</option>
      <option>Cuadrilla Javier</option>
      <option>Otro</option>
      <option value="__sin">Sin asignar</option>
    </select>
    <input id="f-busqueda" placeholder="Buscar cliente…" style="min-width:200px">

    <div class="counters" id="counters"></div>
  </div>

  <main>
    <!-- Vista Gantt -->
    <section id="view-gantt">
      <div class="gantt-wrap" id="gantt-wrap">
        <div class="empty"><h3>Cargando…</h3></div>
      </div>
    </section>

    <!-- Vista Tabla -->
    <section id="view-tabla" class="hidden">
      <div class="tabla-wrap">
        <table class="tabla">
          <thead>
            <tr>
              <th>#</th>
              <th>Cliente</th>
              <th>Estado</th>
              <th>Cuadrilla</th>
              <th>kW</th>
              <th>Programada</th>
              <th>Terminación</th>
              <th>SIRESI</th>
              <th>Asesor</th>
            </tr>
          </thead>
          <tbody id="tabla-body"></tbody>
        </table>
      </div>
    </section>
  </main>

</div>

<!-- ============================================================ DRAWER DETALLE -->
<div class="drawer-backdrop" id="drawer-backdrop"></div>
<aside class="drawer" id="drawer">
  <div class="drawer-head">
    <h2 id="d-titulo">—</h2>
    <button class="drawer-close" id="d-close">×</button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
  <div class="drawer-footer" id="drawer-footer"></div>
</aside>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   CONFIG
   ============================================================ */
const SUPABASE_URL  = 'https://lernzlbzrgatqkadwhas.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxlcm56bGJ6cmdhdHFrYWR3aGFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxODgwMzgsImV4cCI6MjA5Mzc2NDAzOH0.G4AWdtTdxew0_EHGeHx28ijwHJOuyuXyVG0KbR-J8k4'; // 

// Usuarios V1 — definir contraseñas reales antes de desplegar
const USERS = {
  german:  { pass: 'german123',  display: 'German'  },
  daniel:  { pass: 'daniel123',  display: 'Daniel'  },
  sgerman: { pass: 'sgerman123', display: 'SGerman' },
  admin:   { pass: 'Tecnoden10!', display: 'Admin'  }, // compartido con CRM viejo por compatibilidad
  victor:  { pass: 'victor123',   display: 'Victor' }
};

const CUADRILLAS = ['Cuadrilla Tecnoden', 'Cuadrilla Alex', 'Cuadrilla Javier', 'Otro'];
const ESTADOS    = ['Pendiente', 'En trámite', 'En instalación', 'Terminado'];

const supa = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

/* ============================================================
   STATE
   ============================================================ */
let currentUser = null;
let proyectos   = [];
let currentView = 'gantt';
let currentDrawerId = null;

/* ============================================================
   LOGIN
   ============================================================ */
const $ = (sel) => document.querySelector(sel);

$('#login-form').addEventListener('submit', (e) => {
  e.preventDefault();
  const u = $('#u-user').value.trim().toLowerCase();
  const p = $('#u-pass').value;
  const found = USERS[u];
  if (!found || found.pass !== p) {
    $('#login-error').textContent = 'Usuario o contraseña incorrectos';
    return;
  }
  currentUser = found.display;
  localStorage.setItem('crmp_user', u);
  startApp();
});

$('#logout').addEventListener('click', () => {
  localStorage.removeItem('crmp_user');
  location.reload();
});

// Auto-login si hay sesión
const saved = localStorage.getItem('crmp_user');
if (saved && USERS[saved]) {
  currentUser = USERS[saved].display;
  startApp();
}

function startApp() {
  $('#login-screen').classList.add('hidden');
  $('#app').classList.remove('hidden');
  $('#user-chip').textContent = currentUser;
  bindUI();
  loadProyectos();
}

/* ============================================================
   UI BINDINGS
   ============================================================ */
function bindUI() {
  // View switch
  document.querySelectorAll('#view-switch button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#view-switch button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentView = btn.dataset.view;
      $('#view-gantt').classList.toggle('hidden', currentView !== 'gantt');
      $('#view-tabla').classList.toggle('hidden', currentView !== 'tabla');
      render();
    });
  });

  // Filtros
  ['f-estado', 'f-cuadrilla', 'f-busqueda'].forEach(id => {
    $('#' + id).addEventListener('input', render);
  });

  // Drawer
  $('#d-close').addEventListener('click', closeDrawer);
  $('#drawer-backdrop').addEventListener('click', closeDrawer);

  // Atajo de teclado: Ctrl/Cmd + S para guardar mientras el drawer está abierto
  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's') {
      if (currentDrawerId && document.getElementById('d-save')) {
        e.preventDefault();
        guardarDrawer();
      }
    }
    if (e.key === 'Escape' && currentDrawerId) {
      closeDrawer();
    }
  });
}

/* ============================================================
   DATA
   ============================================================ */
async function loadProyectos() {
  const { data, error } = await supa
    .from('proyectos')
    .select('*')
    .order('creado_en', { ascending: false });
  if (error) {
    toast('Error cargando proyectos: ' + error.message, 'err');
    return;
  }
  proyectos = data || [];
  render();
}

async function loadComentarios(proyectoId, tabla) {
  const { data, error } = await supa
    .from(tabla)
    .select('*')
    .eq('proyecto_id', proyectoId)
    .order('creado_en', { ascending: false });
  if (error) {
    toast('Error cargando comentarios: ' + error.message, 'err');
    return [];
  }
  return data || [];
}

async function addComentario(tabla, proyectoId, comentario) {
  const { error } = await supa.from(tabla).insert({
    proyecto_id: proyectoId,
    autor: currentUser,
    comentario
  });
  if (error) { toast('Error: ' + error.message, 'err'); return false; }
  return true;
}

async function actualizarProyecto(id, cambios) {
  const { data, error } = await supa.from('proyectos').update(cambios).eq('id', id).select();
  if (error) {
    console.error('Error actualizando proyecto:', error);
    toast('Error: ' + error.message, 'err');
    return false;
  }
  console.log('Proyecto actualizado:', data);
  return true;
}

/* ============================================================
   FILTROS
   ============================================================ */
function aplicarFiltros(lista) {
  const fEst = $('#f-estado').value;
  const fCua = $('#f-cuadrilla').value;
  const fBus = $('#f-busqueda').value.trim().toLowerCase();
  return lista.filter(p => {
    if (fEst && p.estado !== fEst) return false;
    if (fCua === '__sin') { if (p.cuadrilla) return false; }
    else if (fCua && p.cuadrilla !== fCua) return false;
    if (fBus) {
      const blob = `${p.cliente_nombre||''} ${p.asesor_original||''} ${p.siresi||''}`.toLowerCase();
      if (!blob.includes(fBus)) return false;
    }
    return true;
  });
}

/* ============================================================
   RENDER
   ============================================================ */
function render() {
  const filtrados = aplicarFiltros(proyectos);
  renderCounters(filtrados);
  if (currentView === 'gantt') renderGantt(filtrados);
  else renderTabla(filtrados);
}

function renderCounters(filtrados) {
  const colors = {
    'Pendiente':       'var(--st-pendiente)',
    'En trámite':      'var(--st-tramite)',
    'En instalación':  'var(--st-instalacion)',
    'Terminado':       'var(--st-terminado)'
  };
  $('#counters').innerHTML = ESTADOS.map(est => {
    const n = filtrados.filter(p => p.estado === est).length;
    return `<div class="counter">
      <span class="dot" style="background:${colors[est]}"></span>
      <span>${est}</span>
      <span class="num">${n}</span>
    </div>`;
  }).join('');
}

/* ---------- TABLA ---------- */
function renderTabla(lista) {
  const body = $('#tabla-body');
  if (lista.length === 0) {
    body.innerHTML = `<tr><td colspan="9"><div class="empty"><h3>Sin proyectos</h3><p>No hay proyectos que coincidan con los filtros.</p></div></td></tr>`;
    return;
  }
  body.innerHTML = lista.map(p => {
    const estClass = estadoClass(p.estado);
    const cuadrilla = p.cuadrilla === 'Otro' ? (p.cuadrilla_otro || 'Otro') : (p.cuadrilla || '—');
    return `<tr class="${p.bloqueado ? 'bloqueado' : ''}" data-id="${p.id}">
      <td class="mono" style="color:var(--ink-mute)">${p.cotizacion_num ? '#' + p.cotizacion_num : '—'}</td>
      <td>${p.bloqueado ? '<span class="lock-icon">🔒</span>' : ''}${escapeHtml(p.cliente_nombre || '(sin nombre)')}</td>
      <td><span class="estado-pill ${estClass}">${p.estado}</span></td>
      <td class="mono" style="font-size:12px">${escapeHtml(cuadrilla)}</td>
      <td class="mono">${p.kw_sistema ? p.kw_sistema + ' kW' : '—'}</td>
      <td class="mono">${fmtFecha(p.fecha_programada_instalacion)}</td>
      <td class="mono">${fmtFecha(p.fecha_terminacion)}</td>
      <td class="mono">${escapeHtml(p.siresi || '—')}</td>
      <td>${escapeHtml(p.asesor_original || '—')}</td>
    </tr>`;
  }).join('');
  body.querySelectorAll('tr[data-id]').forEach(tr => {
    tr.addEventListener('click', () => openDrawer(parseInt(tr.dataset.id)));
  });
}

/* ---------- GANTT ---------- */
function renderGantt(lista) {
  const wrap = $('#gantt-wrap');
  if (lista.length === 0) {
    wrap.innerHTML = `<div class="empty"><h3>Sin proyectos</h3><p>No hay proyectos que coincidan con los filtros.</p></div>`;
    return;
  }

  // Calcular rango de fechas
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  let minFecha = new Date(hoy); minFecha.setDate(minFecha.getDate() - 14);
  let maxFecha = new Date(hoy); maxFecha.setDate(maxFecha.getDate() + 60);

  lista.forEach(p => {
    [p.fecha_venta, p.fecha_programada_instalacion, p.fecha_inicio_instalacion, p.fecha_terminacion]
      .filter(Boolean).forEach(f => {
        const d = parseFecha(f);
        if (d < minFecha) minFecha = d;
        if (d > maxFecha) maxFecha = d;
      });
  });

  const totalDias = Math.max(1, Math.ceil((maxFecha - minFecha) / 86400000));
  const dayWidth = 18; // px por día
  const timeWidth = totalDias * dayWidth;

  // Generar meses para el header
  const meses = [];
  let cursor = new Date(minFecha);
  while (cursor <= maxFecha) {
    const inicioMes = new Date(cursor.getFullYear(), cursor.getMonth(), 1);
    const finMes = new Date(cursor.getFullYear(), cursor.getMonth() + 1, 0);
    const desde = Math.max(0, Math.floor((inicioMes - minFecha) / 86400000));
    const hasta = Math.min(totalDias, Math.floor((finMes - minFecha) / 86400000) + 1);
    const ancho = (hasta - desde) * dayWidth;
    meses.push({
      label: cursor.toLocaleDateString('es-MX', { month: 'short', year: '2-digit' }).toUpperCase(),
      ancho
    });
    cursor = new Date(cursor.getFullYear(), cursor.getMonth() + 1, 1);
  }

  // Building HTML
  const sideRows = lista.map(p => `
    <div class="gantt-row" data-id="${p.id}">
      ${p.bloqueado ? '<span class="lock-icon">🔒</span>' : ''}
      <span class="nombre">${escapeHtml(p.cliente_nombre || '(sin nombre)')}</span>
      <span class="cuadrilla">${escapeHtml(cuadrillaCorta(p))}</span>
    </div>
  `).join('');

  const todayOffset = Math.floor((hoy - minFecha) / 86400000) * dayWidth;

  const timeRows = lista.map(p => {
    const bars = barrasProyecto(p, minFecha, dayWidth, totalDias);
    // Día grid de fondo
    let dayGrid = '<div class="day-grid">';
    for (let i = 0; i < totalDias; i++) {
      const d = new Date(minFecha); d.setDate(d.getDate() + i);
      const isWeekend = (d.getDay() === 0 || d.getDay() === 6);
      dayGrid += `<div class="day ${isWeekend ? 'weekend' : ''}"></div>`;
    }
    dayGrid += '</div>';
    return `<div class="gantt-time-row" style="width:${timeWidth}px">${dayGrid}${bars}</div>`;
  }).join('');

  wrap.innerHTML = `
    <div class="gantt">
      <div class="gantt-side">
        <div class="gantt-side-header">Proyecto · Cuadrilla</div>
        ${sideRows}
      </div>
      <div class="gantt-time">
        <div class="gantt-time-header" style="grid-template-columns:${meses.map(m => m.ancho + 'px').join(' ')}; width:${timeWidth}px">
          ${meses.map(m => `<div class="month">${m.label}</div>`).join('')}
        </div>
        <div style="position:relative">
          <div class="gantt-today" style="left:${todayOffset}px; height:${lista.length * 44}px"></div>
          ${timeRows}
        </div>
      </div>
    </div>
  `;

  wrap.querySelectorAll('.gantt-row').forEach(row => {
    row.addEventListener('click', () => openDrawer(parseInt(row.dataset.id)));
  });
}

function barrasProyecto(p, minFecha, dayWidth, totalDias) {
  const bars = [];
  // Barra 1: Pendiente / Trámite — de fecha_venta a fecha_programada_instalacion (o hoy si no hay)
  if (p.fecha_venta) {
    const fin = p.fecha_programada_instalacion || p.fecha_inicio_instalacion || new Date().toISOString().slice(0,10);
    bars.push(makeBar(p.fecha_venta, fin, p.estado === 'En trámite' ? 'estado-tramite' : 'estado-pendiente', p.estado, minFecha, dayWidth));
  }
  // Barra 2: Instalación
  if (p.fecha_programada_instalacion || p.fecha_inicio_instalacion) {
    const ini = p.fecha_inicio_instalacion || p.fecha_programada_instalacion;
    const fin = p.fecha_terminacion || p.fecha_programada_instalacion;
    bars.push(makeBar(ini, fin, 'estado-instalacion', '⚙', minFecha, dayWidth));
  }
  // Barra 3: Terminado (un día visual)
  if (p.fecha_terminacion && p.estado === 'Terminado') {
    bars.push(makeBar(p.fecha_terminacion, p.fecha_terminacion, 'estado-terminado', '✓ Terminado', minFecha, dayWidth));
  }
  return bars.filter(Boolean).join('');
}

function makeBar(ini, fin, klass, label, minFecha, dayWidth) {
  if (!ini || !fin) return '';
  const dIni = parseFecha(ini);
  const dFin = parseFecha(fin);
  if (dFin < dIni) return '';
  const offset = Math.floor((dIni - minFecha) / 86400000) * dayWidth;
  const ancho = Math.max(dayWidth, (Math.floor((dFin - dIni) / 86400000) + 1) * dayWidth - 2);
  return `<div class="gantt-bar ${klass}" style="left:${offset}px; width:${ancho}px" title="${escapeHtml(label)}">${escapeHtml(label)}</div>`;
}

/* ============================================================
   DRAWER DETALLE
   ============================================================ */
async function openDrawer(id) {
  currentDrawerId = id;
  const p = proyectos.find(x => x.id === id);
  if (!p) return;

  $('#d-titulo').textContent = (p.cotizacion_num ? `#${p.cotizacion_num} · ` : '') + (p.cliente_nombre || '(sin nombre)');
  $('#drawer').classList.add('open');
  $('#drawer-backdrop').classList.add('open');

  const cuadrillaSelect = CUADRILLAS.map(c =>
    `<option ${p.cuadrilla === c ? 'selected' : ''}>${c}</option>`
  ).join('');
  const estadoSelect = ESTADOS.map(e =>
    `<option ${p.estado === e ? 'selected' : ''}>${e}</option>`
  ).join('');

  const ro = p.bloqueado ? 'disabled' : '';

  $('#drawer-body').innerHTML = `
    ${p.bloqueado ? `<div class="banner-bloqueado">🔒 Proyecto bloqueado · la cotización ya no está marcada como Vendida en el CRM principal.</div>` : ''}

    <div class="section">
      <h3>Cliente</h3>
      <div class="grid-2">
        <div class="field"><label>Nombre</label><input value="${escapeAttr(p.cliente_nombre)}" data-field="cliente_nombre" ${ro}></div>
        <div class="field"><label>Teléfono</label><input value="${escapeAttr(p.cliente_telefono)}" data-field="cliente_telefono" ${ro}></div>
        <div class="field" style="grid-column:1/-1"><label>Dirección de instalación</label><input value="${escapeAttr(p.direccion_instalacion)}" data-field="direccion_instalacion" ${ro}></div>
        <div class="field"><label>Asesor original</label><input value="${escapeAttr(p.asesor_original)}" data-field="asesor_original" ${ro}></div>
        <div class="field"><label>Fecha de venta</label><input type="date" value="${p.fecha_venta || ''}" data-field="fecha_venta" ${ro}></div>
      </div>
    </div>

    <div class="section">
      <h3>Pipeline</h3>
      <div class="grid-3">
        <div class="field"><label>Estado</label>
          <select data-field="estado" ${ro}>${estadoSelect}</select>
        </div>
        <div class="field"><label>Cuadrilla</label>
          <select data-field="cuadrilla" ${ro} id="d-cuadrilla"><option value="">—</option>${cuadrillaSelect}</select>
        </div>
        <div class="field"><label>Si "Otro", ¿cuál?</label>
          <input value="${escapeAttr(p.cuadrilla_otro)}" data-field="cuadrilla_otro" ${ro} id="d-cuadrilla-otro">
        </div>
      </div>
      <div class="grid-3">
        <div class="field"><label>Programada</label><input type="date" value="${p.fecha_programada_instalacion || ''}" data-field="fecha_programada_instalacion" ${ro}></div>
        <div class="field"><label>Inicio real</label><input type="date" value="${p.fecha_inicio_instalacion || ''}" data-field="fecha_inicio_instalacion" ${ro}></div>
        <div class="field"><label>Terminación</label><input type="date" value="${p.fecha_terminacion || ''}" data-field="fecha_terminacion" ${ro}></div>
      </div>
    </div>

    <div class="section">
      <h3>Datos técnicos</h3>
      <div class="grid-3">
        <div class="field"><label>kW del sistema</label><input type="number" step="0.01" value="${p.kw_sistema || ''}" data-field="kw_sistema" ${ro}></div>
        <div class="field"><label># paneles</label><input type="number" value="${p.num_paneles || ''}" data-field="num_paneles" ${ro}></div>
        <div class="field"><label>Tipo de estructura</label><input value="${escapeAttr(p.tipo_estructura)}" data-field="tipo_estructura" ${ro}></div>
        <div class="field"><label>Marca paneles</label><input value="${escapeAttr(p.marca_paneles)}" data-field="marca_paneles" ${ro}></div>
        <div class="field"><label>Modelo paneles</label><input value="${escapeAttr(p.modelo_paneles)}" data-field="modelo_paneles" ${ro}></div>
        <div class="field"></div>
        <div class="field"><label>Marca inversor</label><input value="${escapeAttr(p.marca_inversor)}" data-field="marca_inversor" ${ro}></div>
        <div class="field"><label>Modelo inversor</label><input value="${escapeAttr(p.modelo_inversor)}" data-field="modelo_inversor" ${ro}></div>
        <div class="field"></div>
      </div>
      <div class="field"><label>Notas técnicas</label><textarea data-field="notas_tecnicas" ${ro}>${escapeHtml(p.notas_tecnicas || '')}</textarea></div>
    </div>

    <div class="section">
      <h3>Trámite CFE (SIRESI)</h3>
      <div class="field" style="max-width:280px"><label>Número SIRESI</label><input value="${escapeAttr(p.siresi)}" data-field="siresi" ${ro}></div>
      <div style="margin-top:10px">
        <div class="comentarios-list" id="cfe-list"><div class="empty" style="padding:20px">Cargando…</div></div>
        ${p.bloqueado ? '' : `
          <div class="comentario-input-row">
            <textarea id="cfe-new" placeholder="Actualización del SIRESI…"></textarea>
            <button class="btn btn-sm" id="cfe-add">Agregar</button>
          </div>
        `}
      </div>
    </div>

    <div class="section">
      <h3>Bitácora general</h3>
      <div class="comentarios-list" id="gen-list"><div class="empty" style="padding:20px">Cargando…</div></div>
      ${p.bloqueado ? '' : `
        <div class="comentario-input-row">
          <textarea id="gen-new" placeholder="Nota interna del proyecto…"></textarea>
          <button class="btn btn-sm" id="gen-add">Agregar</button>
        </div>
      `}
    </div>

    ${p.bloqueado ? '' : `
      <div style="display:flex; gap:8px; justify-content:flex-end; margin-top:12px">
        <span style="font-size:11px; color:var(--ink-mute); align-self:center">Usa los botones de abajo para guardar →</span>
      </div>
    `}
  `;

  // Footer siempre visible
  if (p.bloqueado) {
    $('#drawer-footer').innerHTML = `
      <span style="color:var(--warn); font-size:13px; margin-right:auto">🔒 Proyecto bloqueado</span>
      <button class="btn btn-ghost btn-sm" id="d-cancel">Cerrar</button>
    `;
  } else {
    $('#drawer-footer').innerHTML = `
      <button class="btn btn-ghost btn-sm" id="d-cancel">Cerrar</button>
      <button class="btn btn-sm" id="d-save">Guardar cambios</button>
    `;
  }

  // Bindings del drawer
  $('#d-cancel').addEventListener('click', closeDrawer);
  if (!p.bloqueado) {
    $('#d-save').addEventListener('click', guardarDrawer);
    $('#cfe-add').addEventListener('click', () => agregarComentario('cfe'));
    $('#gen-add').addEventListener('click', () => agregarComentario('gen'));
  }

  // Cargar bitácoras
  cargarBitacoras(id);
}

async function cargarBitacoras(id) {
  const [cfe, gen] = await Promise.all([
    loadComentarios(id, 'proyecto_comentarios_cfe'),
    loadComentarios(id, 'proyecto_comentarios_general')
  ]);
  $('#cfe-list').innerHTML = cfe.length
    ? cfe.map(c => renderComentario(c)).join('')
    : '<div class="empty" style="padding:20px">Sin actualizaciones del SIRESI.</div>';
  $('#gen-list').innerHTML = gen.length
    ? gen.map(c => renderComentario(c)).join('')
    : '<div class="empty" style="padding:20px">Sin notas en la bitácora.</div>';
}

function renderComentario(c) {
  return `<div class="comentario">
    <div class="meta">
      <span class="autor">${escapeHtml(c.autor)}</span>
      <span>${fmtFechaHora(c.creado_en)}</span>
    </div>
    <div>${escapeHtml(c.comentario)}</div>
  </div>`;
}

async function agregarComentario(tipo) {
  const tabla = tipo === 'cfe' ? 'proyecto_comentarios_cfe' : 'proyecto_comentarios_general';
  const input = $('#' + tipo + '-new');
  const texto = input.value.trim();
  if (!texto) return;
  const ok = await addComentario(tabla, currentDrawerId, texto);
  if (ok) {
    input.value = '';
    toast('Comentario agregado', 'ok');
    cargarBitacoras(currentDrawerId);
  }
}

async function guardarDrawer() {
  const cambios = {};
  document.querySelectorAll('#drawer-body [data-field]').forEach(el => {
    let v = el.value;
    const field = el.dataset.field;

    // Vacío → null
    if (v === '' || v === undefined) {
      v = null;
    } else if (el.type === 'number') {
      const n = parseFloat(v);
      v = isNaN(n) ? null : n;
    }
    cambios[field] = v;
  });

  console.log('Guardando proyecto', currentDrawerId, cambios);

  const ok = await actualizarProyecto(currentDrawerId, cambios);
  if (ok) {
    toast('Cambios guardados', 'ok');
    await loadProyectos();
    closeDrawer();
  }
}

function closeDrawer() {
  $('#drawer').classList.remove('open');
  $('#drawer-backdrop').classList.remove('open');
  currentDrawerId = null;
}

/* ============================================================
   HELPERS
   ============================================================ */
function estadoClass(e) {
  return {
    'Pendiente':       'estado-pendiente',
    'En trámite':      'estado-tramite',
    'En instalación':  'estado-instalacion',
    'Terminado':       'estado-terminado'
  }[e] || 'estado-pendiente';
}
function cuadrillaCorta(p) {
  if (!p.cuadrilla) return '—';
  if (p.cuadrilla === 'Otro') return p.cuadrilla_otro || 'Otro';
  return p.cuadrilla.replace('Cuadrilla ', '');
}
function parseFecha(f) {
  const d = new Date(f + 'T00:00:00');
  return isNaN(d) ? new Date(f) : d;
}
function fmtFecha(f) {
  if (!f) return '—';
  const d = parseFecha(f);
  return d.toLocaleDateString('es-MX', { day: '2-digit', month: 'short' });
}
function fmtFechaHora(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('es-MX', { day: '2-digit', month: 'short' }) + ' · ' +
         d.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
}
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function escapeAttr(s) { return escapeHtml(s); }

let toastTimer = null;
function toast(msg, kind = 'ok') {
  const t = $('#toast');
  t.textContent = msg;
  t.className = 'toast show ' + kind;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}
</script>
